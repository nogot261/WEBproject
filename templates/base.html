<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WebServer + API{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">WebServer + API</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/">Главная</a>
            <a class="btn btn-outline-light btn-sm" href="/external-fact">Внешний API</a>
            <a class="btn btn-outline-light btn-sm" href="/docs">Swagger</a>
            {% if user %}
                <a class="btn btn-primary btn-sm" href="/dashboard">Кабинет</a>
                <a class="btn btn-warning btn-sm" href="/logout">Выход</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="/login">Вход</a>
                <a class="btn btn-primary btn-sm" href="/register">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container pb-5">
    {% block content %}{% endblock %}
</div>
</body>
</html>
